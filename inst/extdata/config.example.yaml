      publisher: Elsevier
      issn_print: 0304-405X
    sync:
      filters:
        issn: 0304-405X
  - journal_id: arxiv_cs_ai
    title: arXiv cs.AI
    remote_channel: arxiv
    local_path: data/literature/arxiv_cs_ai
